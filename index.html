<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CortexFlow — Decision Intelligence System</title>

<style>
:root{
  --bg:#0b0f1a;
  --surface:#111827;
  --surface-2:#1a2235;
  --border:#1f2d45;

  --text-1:#f0f4ff;
  --text-2:#94a3c4;
  --text-3:#5a6a8a;

  --gold:#f0a500;
  --green:#10b981;
  --amber:#f59e0b;
  --red:#ef4444;

  --radius:14px;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text-1);
  padding:20px;
}

.container{max-width:520px;margin:auto;}

.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:14px;
}

label{font-size:12px;color:var(--text-2);display:block;margin-bottom:6px}

input,select{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  background:var(--surface-2);
  border:1px solid var(--border);
  color:white;
  border-radius:8px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:var(--gold);
  font-weight:700;
  cursor:pointer;
}

.metric{
  display:flex;
  justify-content:space-between;
  margin:6px 0;
  font-size:13px;
}

.badge{
  padding:10px;
  border-radius:10px;
  text-align:center;
  margin-bottom:10px;
  font-weight:700;
}

.low{background:rgba(16,185,129,0.15);color:var(--green)}
.medium{background:rgba(245,158,11,0.15);color:var(--amber)}
.high{background:rgba(239,68,68,0.15);color:var(--red)}

.small{font-size:12px;color:var(--text-2)}

.range-label{font-size:11px;color:var(--text-3)}
</style>
</head>

<body>

<div class="container">

<!-- INPUTS -->
<div class="card">
  <h3>Financial Inputs</h3>

  <label>Inflow</label>
  <input id="inflow" type="number" value="0">

  <label>Outflow</label>
  <input id="outflow" type="number" value="0">

  <label>Reserve</label>
  <input id="reserve" type="number" value="0">

  <label>Stability</label>
  <select id="stability">
    <option value="100">Stable</option>
    <option value="70">Medium</option>
    <option value="30">Unstable</option>
  </select>

  <label>Delay</label>
  <select id="delay">
    <option value="100">On time</option>
    <option value="50">Delayed</option>
    <option value="10">Severely delayed</option>
  </select>

  <label>Flexibility</label>
  <select id="flex">
    <option value="10">Flexible</option>
    <option value="50">Medium</option>
    <option value="90">Fixed</option>
  </select>

  <button onclick="runEngine()">Analyze</button>
</div>

<!-- RESULTS -->
<div class="card" id="results" style="display:none">

  <div id="badge"></div>

  <div class="metric"><span>Net Flow</span><span id="net"></span></div>
  <div class="metric"><span>Runway</span><span id="runway"></span></div>
  <div class="metric"><span>Stress</span><span id="stress"></span></div>

</div>

<!-- SCENARIO -->
<div class="card" id="scenario" style="display:none">

  <h3>Scenario Simulator</h3>

  <label>Revenue Change (%)</label>
  <input type="range" id="rev" min="-30" max="30" value="0">
  <div class="range-label" id="revv">0%</div>

  <label>Expense Change (%)</label>
  <input type="range" id="exp" min="-30" max="30" value="0">
  <div class="range-label" id="expv">0%</div>

  <label>Payment Delay (days)</label>
  <input type="range" id="del" min="-20" max="20" value="0">
  <div class="range-label" id="delv">0</div>

  <div id="scenarioOut" style="margin-top:10px"></div>

</div>

</div>

<script>

/* ===================== ENGINE ===================== */

const Engine = {

run(inp){
  const net = inp.inflow - inp.outflow;

  const runway =
    net >= 0 ? Infinity :
    inp.reserve > 0 ? inp.reserve / Math.abs(net) : 0;

  const stress =
    net >= 0 ? 0 : Math.min(100, (Math.abs(net)/(inp.reserve||1))*100);

  const risk =
    net < 0 && stress > 70 ? "HIGH" :
    net >= 0 ? "LOW" : "MEDIUM";

  return {net, runway, stress, risk};
}

};

/* ===================== SCENARIO ENGINE ===================== */

const Scenario = {

apply(inp, sc){

  const mod = {
    ...inp,
    inflow: inp.inflow * (1 + sc.rev/100),
    outflow: inp.outflow * (1 + sc.exp/100),
    delay: inp.delay + sc.delay
  };

  const base = Engine.run(inp);
  const after = Engine.run(mod);

  return {base, after};

}

};

/* ===================== UI ===================== */

let currentInput = {};

function runEngine(){

  currentInput = {
    inflow:+inflow.value,
    outflow:+outflow.value,
    reserve:+reserve.value,
    stability:+stability.value,
    delay:+delay.value,
    flex:+flex.value
  };

  const r = Engine.run(currentInput);

  results.style.display="block";
  scenario.style.display="block";

  net.innerText = r.net;
  stress.innerText = r.stress.toFixed(1);

  runway.innerText =
    r.runway === Infinity ? "Strong" : r.runway.toFixed(1)+" months";

  badge.innerHTML =
    `<div class="${r.risk.toLowerCase()} badge">${r.risk} RISK</div>`;

  updateScenario();
}

/* ===================== SCENARIO UI ===================== */

function updateScenario(){

  const sc = {
    rev:+rev.value,
    exp:+exp.value,
    delay:+del.value
  };

  revv.innerText = sc.rev+"%";
  expv.innerText = sc.exp+"%";
  delv.innerText = sc.delay;

  const s = Scenario.apply(currentInput, sc);

  scenarioOut.innerHTML = `
    <div class="small">
    <b>Risk Shift:</b> ${s.base.risk} → ${s.after.risk}<br>
    <b>Net Flow Change:</b> ${s.after.net - s.base.net}<br>
    <b>Stress:</b> ${s.after.stress.toFixed(1)}
    </div>
  `;
}

/* listeners */

rev.oninput = exp.oninput = del.oninput = updateScenario;

</script>

</body>
</html>
