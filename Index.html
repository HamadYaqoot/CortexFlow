<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>CortexFlow</title>
   <style>
       * {
           margin: 0;
           padding: 0;
           box-sizing: border-box;
       }

       body {
           min-height: 100vh;
           display: flex;
           align-items: center;
           justify-content: center;
           background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
           font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
           padding: 20px;
           overflow-x: hidden;
       }

       /* Animated background particles */
       body::before {
           content: '';
           position: fixed;
           top: 0;
           left: 0;
           width: 100%;
           height: 100%;
           background: 
               radial-gradient(circle at 20% 80%, rgba(56, 189, 248, 0.08) 0%, transparent 50%),
               radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
               radial-gradient(circle at 50% 50%, rgba(34, 211, 238, 0.05) 0%, transparent 60%);
           pointer-events: none;
           z-index: 0;
       }

       .container {
           position: relative;
           z-index: 1;
           text-align: center;
           max-width: 600px;
           width: 100%;
           padding: 60px 40px;
           background: rgba(30, 41, 59, 0.6);
           backdrop-filter: blur(20px);
           border: 1px solid rgba(255, 255, 255, 0.08);
           border-radius: 24px;
           box-shadow: 
               0 25px 50px -12px rgba(0, 0, 0, 0.5),
               0 0 0 1px rgba(255, 255, 255, 0.05) inset;
           animation: fadeInUp 0.8s ease-out;
       }

       @keyframes fadeInUp {
           from {
               opacity: 0;
               transform: translateY(30px);
           }
           to {
               opacity: 1;
               transform: translateY(0);
           }
       }

       h1 {
           font-size: 4rem;
           font-weight: 800;
           background: linear-gradient(135deg, #38bdf8 0%, #818cf8 50%, #c084fc 100%);
           -webkit-background-clip: text;
           -webkit-text-fill-color: transparent;
           background-clip: text;
           letter-spacing: -2px;
           margin-bottom: 16px;
           position: relative;
           display: inline-block;
       }

       h1::after {
           content: '';
           position: absolute;
           bottom: -8px;
           left: 50%;
           transform: translateX(-50%);
           width: 80px;
           height: 4px;
           background: linear-gradient(90deg, #38bdf8, #c084fc);
           border-radius: 2px;
       }

       p {
           font-size: 1.25rem;
           color: #94a3b8;
           margin-bottom: 40px;
           line-height: 1.6;
           font-weight: 400;
       }

       .features {
           display: flex;
           flex-direction: column;
           gap: 16px;
           margin-bottom: 40px;
           align-items: center;
       }

       .feature-item {
           display: flex;
           align-items: center;
           gap: 14px;
           padding: 16px 28px;
           background: rgba(15, 23, 42, 0.6);
           border: 1px solid rgba(255, 255, 255, 0.06);
           border-radius: 14px;
           width: 100%;
           max-width: 340px;
           font-size: 1.05rem;
           color: #e2e8f0;
           transition: all 0.3s ease;
           cursor: default;
           position: relative;
           overflow: hidden;
       }

       .feature-item::before {
           content: '';
           position: absolute;
           top: 0;
           left: 0;
           width: 100%;
           height: 100%;
           background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
           transform: translateX(-100%);
           transition: transform 0.6s ease;
       }

       .feature-item:hover::before {
           transform: translateX(100%);
       }

       .feature-item:hover {
           transform: translateX(8px);
           border-color: rgba(56, 189, 248, 0.3);
           box-shadow: 0 4px 20px rgba(56, 189, 248, 0.1);
       }

       .feature-item .icon {
           font-size: 1.4rem;
           flex-shrink: 0;
           filter: drop-shadow(0 0 8px rgba(255,255,255,0.2));
       }

       .feature-item:nth-child(1) .icon { color: #fbbf24; }
       .feature-item:nth-child(2) .icon { color: #f87171; }
       .feature-item:nth-child(3) .icon { color: #34d399; }

       a {
           display: inline-flex;
           align-items: center;
           justify-content: center;
           gap: 10px;
           padding: 18px 40px;
           background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #ec4899 100%);
           background-size: 200% 200%;
           color: #ffffff;
           text-decoration: none;
           font-size: 1.1rem;
           font-weight: 600;
           border-radius: 14px;
           border: none;
           cursor: pointer;
           transition: all 0.4s ease;
           box-shadow: 
               0 10px 30px -5px rgba(139, 92, 246, 0.4),
               0 0 0 1px rgba(255, 255, 255, 0.1) inset;
           position: relative;
           overflow: hidden;
           letter-spacing: 0.3px;
       }

       a::before {
           content: '';
           position: absolute;
           top: 0;
           left: -100%;
           width: 100%;
           height: 100%;
           background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
           transition: left 0.6s ease;
       }

       a:hover::before {
           left: 100%;
       }

       a:hover {
           transform: translateY(-3px);
           box-shadow: 
               0 20px 40px -5px rgba(139, 92, 246, 0.5),
               0 0 0 1px rgba(255, 255, 255, 0.15) inset;
           background-position: 100% 0;
       }

       a:active {
           transform: translateY(-1px);
       }

       a::after {
           content: '→';
           font-size: 1.2rem;
           transition: transform 0.3s ease;
       }

       a:hover::after {
           transform: translateX(4px);
       }

       /* Floating animation for subtle movement */
       @keyframes float {
           0%, 100% { transform: translateY(0px); }
           50% { transform: translateY(-10px); }
       }

       .container {
           animation: fadeInUp 0.8s ease-out, float 6s ease-in-out infinite 0.8s;
       }

       /* Responsive */
       @media (max-width: 480px) {
           h1 { font-size: 2.8rem; }
           .container { padding: 40px 24px; }
           p { font-size: 1.1rem; }
           .feature-item { font-size: 0.95rem; padding: 14px 20px; }
           a { padding: 16px 32px; font-size: 1rem; }
       }
   </style>
</head>
<body>
   <div class="container">
       <h1>CortexFlow</h1>
       <p>Know your financial risk and what to do next — instantly.</p>

       <div class="features">
           <div class="feature-item">
               <span class="icon">⚡</span>
               <span>Analyze your cash flow</span>
           </div>
           <div class="feature-item">
               <span class="icon">📉</span>
               <span>Detect financial risks</span>
           </div>
           <div class="feature-item">
               <span class="icon">💡</span>
               <span>Get clear decisions</span>
           </div>
       </div>

       <a href="YOUR_FORM_LINK">
           Get My Financial Decision System
       </a>
   </div>
</body>
</html>
